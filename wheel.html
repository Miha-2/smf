<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Kolo sreče | Sport Media Focus Fan Cona</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --teal: #005F7E; --teal-dark: #004d67; --navy: #013150;
    --yellow: #FFCD57; --yellow-dark: #e6b83e;
    --body-text: #67768e; --light-bg: #eef2f5; --board-bg: #dde4ea; --white: #ffffff;
  }
  body { font-family: 'Montserrat', sans-serif; background: var(--navy); }
  .phone-frame { width: 100%; max-width: 480px; margin: 0 auto; background: var(--light-bg); display: flex; flex-direction: column; }

  .logo-img { height: 44px; width: auto; position: relative; z-index: 1; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .hero-diagonal { position: absolute; right: 0; top: 0; width: 26%; height: 100%; background: rgba(255,255,255,0.07); transform: skewX(-12deg); transform-origin: bottom right; pointer-events: none; z-index: 0; }
  .hero-bar { background: var(--navy); padding: 16px 20px 14px; position: relative; overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; }
  .hero-bar::before { content: ''; position: absolute; right: 0; top: 0; width: 26%; height: 100%; background: rgba(0,95,126,0.6); transform: skewX(-12deg); transform-origin: bottom right; pointer-events: none; }
  .hero-bar::after  { content: ''; position: absolute; right: 0; top: 0; width: 42%; height: 100%; background: rgba(0,95,126,0.28); transform: skewX(-12deg); transform-origin: bottom right; pointer-events: none; }
  .game-title { color: var(--white); font-size: 36px; font-weight: 900; line-height: 1; margin-bottom: 3px; letter-spacing: -0.5px; position: relative; z-index: 1; }
  .game-sub   { color: rgba(255,255,255,0.4); font-size: 11px; font-weight: 500; letter-spacing: 0.3px; position: relative; z-index: 1; }

  .wheel-area { background: var(--board-bg); padding: 32px 16px 32px; display: flex; flex-direction: column; align-items: center; position: relative; flex-shrink: 0; }
  .wheel-area::before { content: ''; position: absolute; top: -60px; right: -80px; width: 260px; height: 340px; background: rgba(0,95,126,0.10); transform: rotate(-18deg); pointer-events: none; }

  .wheel-wrap { position: relative; width: min(360px, 94vw); height: min(360px, 94vw); margin-bottom: 10px; }

  .pointer { position: absolute; top: -16px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 11px solid transparent; border-right: 11px solid transparent; border-top: 22px solid var(--yellow); z-index: 10; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }

  canvas#wheel { border-radius: 50%; box-shadow: 0 0 0 5px rgba(1,49,80,0.12), 0 8px 28px rgba(1,49,80,0.22); display: block; width: 100%; height: 100%; }

  .wheel-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 52px; height: 52px; border-radius: 50%; background: var(--navy); border: 4px solid var(--yellow); display: flex; align-items: center; justify-content: center; z-index: 5; cursor: pointer; box-shadow: 0 2px 12px rgba(1,49,80,0.35); transition: background 0.2s, transform 0.15s; }
  .wheel-center:hover  { background: var(--teal); transform: translate(-50%,-50%) scale(1.08); }
  .wheel-center:active { transform: translate(-50%,-50%) scale(0.95); }
  .wheel-center.done   { border-color: var(--body-text); cursor: default; }
  .wheel-center.done:hover { background: var(--navy); transform: translate(-50%,-50%); }
  .wheel-center svg { width: 22px; height: 22px; fill: var(--yellow); transition: fill 0.2s; }
  .wheel-center.done svg { fill: var(--body-text); }
  .wheel-center.spinning { pointer-events: none; }
  .wheel-center.spinning svg { opacity: 0; transition: opacity 0.2s; }
  @keyframes spinIcon { to { transform: rotate(360deg); } }


  .legend-header { align-self: stretch; text-align: center; margin-top: 16px; margin-bottom: 12px; }
  .legend-header span { color: var(--teal); font-size: 9px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; position: relative; }
  .legend-header span::before, .legend-header span::after { content: ''; display: inline-block; width: 32px; height: 1px; background: rgba(0,95,126,0.25); vertical-align: middle; margin: 0 10px; }
  .legend { align-self: stretch; display: flex; flex-direction: column; gap: 4px; }
  .legend-row { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.5); border-radius: 8px; padding: 6px 9px; border: 1.5px solid transparent; transition: border-color 0.4s, background 0.4s, box-shadow 0.4s; }
  .legend-row.active { background: var(--white); border-color: var(--teal); box-shadow: 0 2px 10px rgba(0,95,126,0.13); }
  .legend-swatch { width: 26px; height: 26px; border-radius: 6px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .legend-swatch svg { width: 14px; height: 14px; }
  .legend-text { flex: 1; min-width: 0; }
  .legend-name { color: var(--navy); font-size: 11px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color 0.3s; }
  .legend-row.active .legend-name { color: var(--teal); }
  .legend-desc { display: none; }
  .legend-badge { font-size: 8px; font-weight: 800; letter-spacing: 0.8px; text-transform: uppercase; padding: 2px 6px; border-radius: 20px; flex-shrink: 0; background: rgba(1,49,80,0.08); color: var(--body-text); transition: background 0.3s, color 0.3s; }
  .legend-row.active .legend-badge { background: var(--teal); color: var(--white); }


  .prize-overlay { display: none; position: fixed; inset: 0; background: rgba(1,49,80,0.72); z-index: 100; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(3px); }
  .prize-overlay.show { display: flex; }
  .prize-card { background: var(--white); border-radius: 20px; padding: 36px 28px 28px; text-align: center; width: 100%; max-width: 320px; animation: popIn 0.45s cubic-bezier(0.34,1.56,0.64,1); position: relative; overflow: hidden; }
  .prize-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px; background: var(--yellow); }
  .prize-card.no-prize::before { background: var(--body-text); }
  @keyframes popIn { from{transform:scale(0.65) translateY(20px);opacity:0} to{transform:scale(1) translateY(0);opacity:1} }
  .prize-icon { width: 72px; height: 72px; border-radius: 50%; margin: 0 auto 14px; display: flex; align-items: center; justify-content: center; }
  .prize-icon svg { width: 36px; height: 36px; }
  .prize-label { color: var(--teal); font-size: 9px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; }
  .prize-label::after { content:''; display:block; width:28px; height:2px; background:var(--teal); margin:5px auto 8px; }
  .prize-name  { color: var(--navy); font-size: 24px; font-weight: 900; margin-bottom: 4px; line-height: 1.15; }
  .prize-desc  { color: var(--body-text); font-size: 12px; font-weight: 500; margin-bottom: 22px; line-height: 1.6; }
  .prize-code-wrap { background: var(--light-bg); border-radius: 10px; padding: 12px 16px; margin-bottom: 20px; border: 1.5px dashed rgba(0,95,126,0.3); }
  .prize-code-lbl { color: var(--body-text); font-size: 9px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 4px; }
  .prize-code     { color: var(--teal); font-size: 22px; font-weight: 900; letter-spacing: 3px; }
  .prize-btns { display: flex; gap: 10px; }
  .btn { flex: 1; padding: 13px 8px; border: none; border-radius: 10px; font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; cursor: pointer; transition: background 0.18s, transform 0.12s; }
  .btn:active { transform: scale(0.97); }
  .btn-primary   { background: var(--teal); color: var(--white); }
  .btn-primary:hover { background: var(--teal-dark); }
  .btn-secondary { background: rgba(1,49,80,0.09); color: var(--navy); }
  .btn-secondary:hover { background: rgba(1,49,80,0.15); }

  .confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 99; overflow: hidden; }
  .confetti-piece { position: absolute; top: -10px; animation: confettiFall linear forwards; }
  @keyframes confettiFall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
</style>
</head>
<body>
<div class="phone-frame">

  <div class="hero-bar">
    <div class="hero-diagonal"></div>
    <div>
      <div class="game-title">Kolo sreče</div>
      <div class="game-sub">Zavrti in osvoji nagrado!</div>
    </div>
    <img src="SMF-negativ-senca.png" alt="Sport Media Focus" class="logo-img">
  </div>

  <div class="wheel-area">
    <div class="wheel-wrap">
      <div class="pointer"></div>
      <canvas id="wheel"></canvas>
      <div class="wheel-center" id="spin-btn" onclick="spinWheel()">
        <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.96 7.96 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
      </div>
    </div>
    <div class="legend-header"><span>Nagrade</span></div>
    <div class="legend" id="legend"></div>
  </div>


</div>

<div class="prize-overlay" id="prize-overlay">
  <div class="prize-card" id="prize-card">
    <span class="prize-emoji" id="prize-emoji"></span>
    <div class="prize-label" id="prize-label">Nagrada</div>
    <div class="prize-name"  id="prize-name">-</div>
    <div class="prize-desc"  id="prize-desc">-</div>
    <div class="prize-code-wrap" id="prize-code-wrap">
      <div class="prize-code-lbl">Tvoja koda</div>
      <div class="prize-code" id="prize-code">-</div>
    </div>
    <div class="prize-btns">
      <button class="btn btn-secondary" onclick="closePrize()">Zapri</button>
      <button class="btn btn-primary"   onclick="shareWin()">Deli</button>
    </div>
  </div>
</div>

<div class="confetti-wrap" id="confetti-wrap"></div>

<script>
// ── Icon drawers (canvas) ─────────────────────────────────────────────────────
// Each receives (ctx, cx, cy, s, color) — s = icon size radius, color = stroke/fill color

function iconJersey(ctx, cx, cy, s, c) {
  // shirt silhouette: collar notch, two shoulder wings, body
  ctx.save(); ctx.translate(cx, cy); ctx.strokeStyle = c; ctx.fillStyle = c;
  ctx.lineWidth = s * 0.12; ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  const w = s * 0.9, h = s * 0.85;
  ctx.beginPath();
  // left shoulder wing
  ctx.moveTo(-w*0.5, -h*0.35);
  ctx.lineTo(-w*0.72, -h*0.5);
  ctx.lineTo(-w*0.72, -h*0.1);
  ctx.lineTo(-w*0.5,  -h*0.05);
  // body left
  ctx.lineTo(-w*0.5,  h*0.5);
  ctx.lineTo( w*0.5,  h*0.5);
  // body right
  ctx.lineTo( w*0.5,  -h*0.05);
  ctx.lineTo( w*0.72, -h*0.1);
  ctx.lineTo( w*0.72, -h*0.5);
  ctx.lineTo( w*0.5, -h*0.35);
  // collar right
  ctx.quadraticCurveTo(w*0.2, -h*0.55,  0, -h*0.5);
  ctx.quadraticCurveTo(-w*0.2,-h*0.55, -w*0.5, -h*0.35);
  ctx.closePath();
  ctx.stroke();
  ctx.restore();
}

function iconRetry(ctx, cx, cy, s, c) {
  // circular arrow
  ctx.save(); ctx.translate(cx, cy); ctx.strokeStyle = c; ctx.fillStyle = c;
  ctx.lineWidth = s * 0.14; ctx.lineCap = 'round';
  const r = s * 0.62;
  ctx.beginPath();
  ctx.arc(0, 0, r, -Math.PI * 0.85, Math.PI * 0.7);
  ctx.stroke();
  // arrowhead
  const angle = Math.PI * 0.7;
  const ax = r * Math.cos(angle), ay = r * Math.sin(angle);
  ctx.beginPath();
  ctx.moveTo(ax, ay);
  ctx.lineTo(ax - s*0.28*Math.cos(angle - 0.5), ay - s*0.28*Math.sin(angle - 0.5));
  ctx.lineTo(ax - s*0.28*Math.cos(angle + 0.5), ay - s*0.28*Math.sin(angle + 0.5));
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function iconTicket(ctx, cx, cy, s, c) {
  // rectangle ticket with notch on left and dashed centre line
  ctx.save(); ctx.translate(cx, cy); ctx.strokeStyle = c; ctx.fillStyle = c;
  ctx.lineWidth = s * 0.11; ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  const w = s*0.9, h = s*0.52, nr = h*0.28;
  ctx.beginPath();
  ctx.moveTo(-w*0.5 + nr, -h*0.5);
  ctx.lineTo( w*0.5, -h*0.5);
  ctx.lineTo( w*0.5,  h*0.5);
  ctx.lineTo(-w*0.5 + nr,  h*0.5);
  ctx.arcTo(-w*0.5, h*0.5, -w*0.5, 0, nr);
  ctx.arcTo(-w*0.5, -h*0.5, -w*0.5+nr, -h*0.5, nr);
  ctx.closePath(); ctx.stroke();
  // dashed centre divider
  ctx.setLineDash([s*0.08, s*0.08]);
  ctx.lineWidth = s * 0.08;
  ctx.beginPath(); ctx.moveTo(-w*0.12, -h*0.5); ctx.lineTo(-w*0.12, h*0.5); ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function iconBottle(ctx, cx, cy, s, c) {
  // water bottle: cap + neck + body
  ctx.save(); ctx.translate(cx, cy); ctx.strokeStyle = c; ctx.fillStyle = c;
  ctx.lineWidth = s * 0.11; ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  const bw = s*0.42, bh = s*0.72, nw = s*0.22, nh = s*0.18, cw = s*0.28, ch = s*0.12;
  // cap
  ctx.beginPath();
  ctx.rect(-cw/2, -bh/2 - nh - ch, cw, ch);
  ctx.stroke();
  // neck
  ctx.beginPath();
  ctx.rect(-nw/2, -bh/2 - nh, nw, nh);
  ctx.stroke();
  // body
  ctx.beginPath();
  ctx.roundRect(-bw/2, -bh/2, bw, bh, s*0.08);
  ctx.stroke();
  // label line
  ctx.lineWidth = s * 0.08;
  ctx.beginPath(); ctx.moveTo(-bw*0.35, 0); ctx.lineTo(bw*0.35, 0); ctx.stroke();
  ctx.restore();
}

function iconCap(ctx, cx, cy, s, c) {
  // baseball cap: dome + brim
  ctx.save(); ctx.translate(cx, cy); ctx.strokeStyle = c; ctx.fillStyle = c;
  ctx.lineWidth = s * 0.12; ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  const r = s * 0.52;
  // dome (upper semicircle)
  ctx.beginPath();
  ctx.arc(0, s*0.05, r, Math.PI, 0);
  ctx.stroke();
  // band line
  ctx.beginPath();
  ctx.moveTo(-r, s*0.05); ctx.lineTo(r, s*0.05);
  ctx.stroke();
  // brim extending right
  ctx.beginPath();
  ctx.moveTo(-r * 0.2, s*0.05);
  ctx.quadraticCurveTo(r*0.6, s*0.05, r*1.1, s*0.28);
  ctx.quadraticCurveTo(r*0.6, s*0.32, -r*0.2, s*0.32);
  ctx.closePath(); ctx.stroke();
  ctx.restore();
}

// Map icon key → drawer function
const ICON_FN = { jersey: iconJersey, retry: iconRetry, ticket: iconTicket, bottle: iconBottle, cap: iconCap };

// SVG path strings for legend swatches and prize modal
const ICON_SVG = {
  jersey: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"><path d="M4 7l3-3 2 2a3 3 0 006 0l2-2 3 3-2 2v10H6V9L4 7z"/></svg>`,
  retry:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 109-9H8"/><polyline points="8 7 8 3 4 3"/></svg>`,
  ticket: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9a2 2 0 000 6v2a1 1 0 001 1h18a1 1 0 001-1v-2a2 2 0 000-6V7a1 1 0 00-1-1H3a1 1 0 00-1 1v2z"/><line x1="9" y1="6" x2="9" y2="18" stroke-dasharray="2 2"/></svg>`,
  bottle: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="3" rx="1"/><path d="M8 7h8l1 3v9a2 2 0 01-2 2H9a2 2 0 01-2-2v-9l1-3z"/><line x1="9" y1="13" x2="15" y2="13"/></svg>`,
  cap:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 13a8 8 0 0116 0"/><path d="M4 13h16"/><path d="M12 5v2"/><path d="M16 13c1 1.5 3 2 4 1.5"/></svg>`,
};

// ── Prize data ────────────────────────────────────────────────────────────────
const PRIZES = [
  { emoji: '👕', name: 'Dres ekipe',      desc: 'Uradni dres partnerske ekipe. Prevzemi na info pultu.',        code: 'SMF-DRES', color: '#005F7E', iconColor: '#FFCD57', label: 'Jackpot!'     },
  { emoji: '🔄', name: 'Poskusi znova',   desc: 'Tokrat ni šlo. Pridi jutri po novo srečo!',                    code: null,       color: '#cce8f0', iconColor: '#013150', label: 'Brez nagrade' },
  { emoji: '🎟️', name: 'VIP vstopnica',   desc: 'VIP dostop na naslednjo domačo tekmo. Pokaži kodo na vhodu.',  code: 'SMF-VIP1', color: '#013150', iconColor: '#FFCD57', label: 'Nagrada'      },
  { emoji: '💧', name: 'SMF steklenička', desc: 'Ekskluzivna Sport Media Focus steklenička za vodo.',           code: 'SMF-BOTL', color: '#005F7E', iconColor: '#FFCD57', label: 'Nagrada'      },
  { emoji: '🔄', name: 'Poskusi znova',   desc: 'Tokrat ni šlo. Pridi jutri po novo srečo!',                    code: null,       color: '#cce8f0', iconColor: '#013150', label: 'Brez nagrade' },
  { emoji: '🧢', name: 'SMF kapa',        desc: 'Uradna Sport Media Focus kapa. Prevzemi na info pultu.',       code: 'SMF-KAPA', color: '#013150', iconColor: '#FFCD57', label: 'Nagrada'      },
];

// ── Canvas ────────────────────────────────────────────────────────────────────
const SIZE = Math.min(360, Math.round(window.innerWidth * 0.94));
const canvas = document.getElementById('wheel');
canvas.width = canvas.height = SIZE;
const N = PRIZES.length;

function drawWheel() {
  const ctx = canvas.getContext('2d');
  const cx = SIZE / 2, r = cx - 2, arc = (2 * Math.PI) / N;
  ctx.clearRect(0, 0, SIZE, SIZE);
  PRIZES.forEach((p, i) => {
    const a0 = i * arc - Math.PI / 2, a1 = a0 + arc;
    const mid = a0 + arc / 2;
    ctx.beginPath(); ctx.moveTo(cx, cx); ctx.arc(cx, cx, r, a0, a1); ctx.closePath();
    ctx.fillStyle = p.color; ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.22)'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.save();
    ctx.translate(cx + r * 0.60 * Math.cos(mid), cx + r * 0.60 * Math.sin(mid));
    ctx.rotate(mid + Math.PI / 2);
    ctx.font = Math.round(SIZE * 0.115) + 'px serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(p.emoji, 0, 0);
    ctx.restore();
  });
  ctx.beginPath(); ctx.arc(cx, cx, r, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.30)'; ctx.lineWidth = 3; ctx.stroke();
}
drawWheel();

// ── Legend ────────────────────────────────────────────────────────────────────
function buildLegend(activeIdx = -1) {
  const el = document.getElementById('legend');
  el.innerHTML = '';
  // order by rarity: count occurrences, sort ascending (rarest first)
  const counts = {};
  PRIZES.forEach(p => { counts[p.name] = (counts[p.name] || 0) + 1; });
  const unique = [];
  const seen = new Set();
  PRIZES.forEach((p, i) => {
    if (seen.has(p.name)) return; seen.add(p.name);
    unique.push({ p, i });
  });
  unique.sort((a, b) => counts[a.p.name] - counts[b.p.name]);
  unique.forEach(({ p, i }) => {
    const row = document.createElement('div');
    row.className = 'legend-row' + (i === activeIdx ? ' active' : '');
    row.innerHTML = `
      <div class="legend-swatch" style="background:${p.color};font-size:14px">${p.emoji}</div>
      <div class="legend-text"><div class="legend-name">${p.name}</div></div>
      <div class="legend-badge">${p.label}</div>`;
    el.appendChild(row);
  });
}
buildLegend();

// ── State & spin ──────────────────────────────────────────────────────────────
let spun = false, isSpinning = false, currentDeg = 0, lastPrize = null;

function spinWheel() {
  if (isSpinning || spun) return;
  isSpinning = true; spun = true;
  const btn = document.getElementById('spin-btn');
  btn.classList.add('spinning');

  const winIdx    = Math.floor(Math.random() * N);
  const segDeg    = 360 / N;
  const center    = winIdx * segDeg + segDeg / 2;
  const jitter    = (Math.random() - 0.5) * segDeg * 0.5;
  const extra     = (7 + Math.floor(Math.random() * 3)) * 360;
  const targetDeg = currentDeg + extra + ((360 - center + jitter + 360) % 360);
  const duration  = 4200 + Math.random() * 700;

  canvas.style.transition = `transform ${duration}ms cubic-bezier(0.17, 0.67, 0.10, 1.0)`;
  canvas.style.transform  = `rotate(${targetDeg}deg)`;

  setTimeout(() => {
    currentDeg = targetDeg; isSpinning = false;
    btn.classList.remove('spinning'); btn.classList.add('done');
    lastPrize = PRIZES[winIdx];
    buildLegend(winIdx);
    setTimeout(() => showPrize(lastPrize), 500);
  }, duration);
}

// ── Prize modal ───────────────────────────────────────────────────────────────
function showPrize(prize) {
  document.getElementById('prize-emoji').textContent = prize.emoji;
  document.getElementById('prize-label').textContent = prize.label;
  document.getElementById('prize-name').textContent  = prize.name;
  document.getElementById('prize-desc').textContent  = prize.desc;
  const codeWrap = document.getElementById('prize-code-wrap');
  const card     = document.getElementById('prize-card');
  if (prize.code) {
    codeWrap.style.display = 'block';
    document.getElementById('prize-code').textContent = prize.code;
    card.classList.remove('no-prize');
    launchConfetti();
  } else {
    codeWrap.style.display = 'none';
    card.classList.add('no-prize');
  }
  document.getElementById('prize-overlay').classList.add('show');
}

function closePrize() {
  document.getElementById('prize-overlay').classList.remove('show');
}

function shareWin() {
  const t = lastPrize.code
    ? `Pravkar sem zadel "${lastPrize.name}" na Sport Media Focus Fan Coni! Koda: ${lastPrize.code}`
    : `Igral sem Kolo sreče na Sport Media Focus Fan Coni!`;
  if (navigator.share) navigator.share({ text: t }).catch(() => {});
  else navigator.clipboard.writeText(t).catch(() => {});
  closePrize();
}


// ── Confetti ──────────────────────────────────────────────────────────────────
const CC = ['#005F7E','#FFCD57','#013150','#ffffff','#e6b83e','#cce4ed'];
function launchConfetti() {
  const wrap = document.getElementById('confetti-wrap');
  wrap.innerHTML = '';
  for (let i = 0; i < 50; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    const s = 6 + Math.random() * 7;
    p.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;background:${CC[i%CC.length]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.5+Math.random()*1.6}s;animation-delay:${Math.random()*.5}s;`;
    wrap.appendChild(p);
  }
  setTimeout(() => { wrap.innerHTML = ''; }, 3200);
}

canvas.addEventListener('click', spinWheel);
</script>
